<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/jpeg" href="/image.jpg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Ashish Prajapati is a full-stack web developer and AI engineer building production-ready web apps and AI-powered systems." />
    <meta name="theme-color" content="#0a0a0a" />

    <!-- Preconnect for faster font loading -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <!-- Async font loading - won't block render -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
    <noscript><link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"></noscript>

    <!-- Preload critical images -->
    <link rel="preload" as="image" href="/image.jpg">

    <title>Ashish Prajapati | Full-Stack Developer & AI Engineer</title>
    <meta property="og:title" content="Ashish Prajapati | Full-Stack Developer & AI Engineer">
    <meta property="og:description" content="Portfolio, projects, experience, GitHub activity, and contact links for Ashish Prajapati.">
    <meta property="og:type" content="website">
    <meta property="og:image" content="/image.jpg">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:image" content="/image.jpg">

    <style>
      /* Loading screen styles */
      #loading-screen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: #0a0a0a;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 0.3s ease-out;
      }

      #loading-screen.loaded {
        opacity: 0;
        pointer-events: none;
      }

      .loader {
        width: 48px;
        height: 48px;
        border: 3px solid rgba(255, 255, 255, 0.1);
        border-radius: 50%;
        border-top-color: #fff;
        animation: spin 0.8s linear infinite;
      }

      @keyframes spin {
        to { transform: rotate(360deg); }
      }

      .loading-text {
        color: #fff;
        margin-top: 16px;
        font-family: system-ui, -apple-system, sans-serif;
        font-size: 14px;
        opacity: 0.7;
      }

      /* Prevent flash of unstyled content */
      body {
        margin: 0;
        background: #0a0a0a;
        overflow-x: hidden;
      }
    </style>
  </head>
  <body>
    <!-- Loading Screen -->
    <div id="loading-screen">
      <div class="loader"></div>
      <div class="loading-text">Loading...</div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script src="/oneko.js" defer></script>

    <script>
      // Hide loading screen when React app mounts
      window.addEventListener('load', function() {
        setTimeout(function() {
          const loader = document.getElementById('loading-screen');
          if (loader) {
            loader.classList.add('loaded');
            setTimeout(function() {
              loader.remove();
            }, 300);
          }
        }, 100);
      });
    </script>
  </body>
</html>
